# Anchor 🅔 (Hassanpour-protocol) — ConvNeXt-T + linear (Hassanpour-protocol) seed=2
# Caminho 2+3 combinado: fecha padding + split oficial + no-undersample
# de uma vez, replicando o setup Hassanpour et al. 2024 (arXiv 2410.24148).
# Imagens: padding=0.25 (224x224 native tight crops).
# CSV: raw 97k com prefixos train/ e val/.
# Split: train/ pool (65k) sub-dividido 75/25; test = val/ oficial (11k).
# Recipe matched aos definitivos correspondentes (control=baseline; convnext=Fator 5).
# Ver docs/sota_7class_race_audit.md §5 e configs/anchor_hassanpour/README.md.
# Generated by scripts/generate_anchor_hassanpour_configs.py.

model:
  name: LResNet50E_IR
  backbone_arch: convnext_tiny
  pretrained: true
  num_classes: 7
  dropout: 0.2
  head: linear
  arcface_s: 30.0
  arcface_m: 0.5
  arcface_easy_margin: false
training:
  batch_size: 64
  learning_rate: 0.0001
  num_epochs: 25
  optimizer: adamw
  scheduler: cosineannealingwarmrestarts
  loss_function: cross_entropy
  test_size: 0.1
  val_size: 0.25
  num_workers: 0
  random_state: 2
  grad_clip_norm: 5.0
  early_stopping_patience: 5
  use_amp: false
image:
  image_size:
  - 224
  - 224
  image_mean:
  - 0.485
  - 0.456
  - 0.406
  image_std:
  - 0.229
  - 0.224
  - 0.225
preprocessing:
  processing_type: detect_adjust_image
  num_workers: 4
  rotate_angle: 45
  num_rotations: 8
  max_faces_per_image: 1
data:
  dataset_file: data/raw/fairface/fairface_labels.csv
  dataset_image_input_path: data/raw/bucket/fairface-img-margin025
  dataset_image_output_path: data/raw/bucket/fairface-img-margin025
  balance: none
  split_protocol: official
bucket:
  function: download
  bucket_client: s3
  bucket_path_file: data/raw/bucket/
  object_file_name: fairface_original_images.zip
  bucket_name: dataset-fairface
logging:
  log_dir: outputs/logs
  log_level: INFO
  format: '%(asctime)s [%(run_id)s] %(name)s %(levelname)s: %(message)s'
  log_bucket_file: bucket.log
  log_preprocessing_file: preprocessing.log
  log_face_data_file: face_data.log
  log_version_file: version.log
  log_training_file: training.log
  log_evaluation_file: evaluation.log
