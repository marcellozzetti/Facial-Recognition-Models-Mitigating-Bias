# Default configuration.
# Secrets and presigned URLs MUST come from configs/credentials.json (gitignored)
# or environment variables. Never commit credentials to this file.

model:
  name: "LResNet50E_IR"
  pretrained: true
  num_classes: 7
  dropout: 0.5
  head: "linear"          # one of: linear, arcface
  arcface_s: 30.0          # only used when head=arcface
  arcface_m: 0.5           # only used when head=arcface
  arcface_easy_margin: false

training:
  batch_size: 128
  learning_rate: 0.001
  num_epochs: 1                    # 1-epoch smoke run; bump to 25 for the real experiment
  optimizer: "adamw"               # one of: sgd, adamw
  scheduler: "onecyclelr"          # one of: onecyclelr, cosineannealingwarmrestarts
  loss_function: "cross_entropy"   # one of: cross_entropy, arcface
  test_size: 0.2
  num_workers: 4
  random_state: 42

image:
  image_size: [224, 224]
  image_mean: [0.485, 0.456, 0.406]
  image_std:  [0.229, 0.224, 0.225]

preprocessing:
  processing_type: "detect_adjust_image"   # one of: rotate_image, detect_adjust_image
  num_workers: 4
  rotate_angle: 45
  num_rotations: 8
  max_faces_per_image: 1                    # Max faces to keep per image (1 = one face per image)

data:
  dataset_file: "data/raw/fairface/fairface_labels.csv"
  dataset_image_input_path:  "data/processed/fairface_aligned"
  # The label CSV's `file` column already includes "train/" or "val/", so the
  # image dir is the parent of those split folders.
  dataset_image_output_path: "data/processed/fairface_aligned"

bucket:
  function: "download"             # one of: download, upload
  bucket_client: "s3"              # one of: s3, blob
  bucket_path_file: "data/raw/bucket/"
  object_file_name: "fairface_original_images.zip"
  bucket_name: "dataset-fairface"

logging:
  log_dir: "outputs/logs"
  log_level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  log_bucket_file: "bucket.log"
  log_preprocessing_file: "preprocessing.log"
  log_face_data_file: "face_data.log"
  log_version_file: "version.log"
  log_training_file: "training.log"
  log_evaluation_file: "evaluation.log"
