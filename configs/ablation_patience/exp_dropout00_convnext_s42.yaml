# Teste cirurgico C1 — ConvNeXt-T + Hassanpour-protocol + dropout=0.0
#
# Hipotese: dropout=0.2 nas features (extract_features → dropout(p=0.2) →
# head) esta sobre-regularizando, atrasando convergencia em ~0.5-1pp.
# Teste A (patience=15) confirmou que cosine restart NAO e o limitador
# (best F1=0.699 igual ao patience=5). Proxima hipotese: regularizacao
# excessiva.
#
# Este teste mantem o ConvNeXt-T sob protocolo Hassanpour (padding 0.25
# + split oficial + no-undersample) seed 42, mudando APENAS dropout: 0.2 → 0.0.
# Patience volta para 5 (padrao, ja confirmamos que 15 nao ajuda).
#
# Custo: ~1.5h GPU (1 seed × ate ep.13 estimado com early stop).
# Predicao: se dropout era o limitador, F1 sobe para ~0.71-0.72; se nao,
# F1 fica em ~0.70 (igual ao 🅔) e devemos atribuir o gap residual de -1.4pp
# vs Hassanpour ao HPO da recipe deles (parametros nao declarados).

model:
  name: LResNet50E_IR
  backbone_arch: convnext_tiny
  pretrained: true
  num_classes: 7
  dropout: 0.0   # <<< unica mudanca: 0.2 -> 0.0
  head: linear
  arcface_s: 30.0
  arcface_m: 0.5
  arcface_easy_margin: false
training:
  batch_size: 64
  learning_rate: 0.0001
  num_epochs: 25
  optimizer: adamw
  scheduler: cosineannealingwarmrestarts
  loss_function: cross_entropy
  test_size: 0.1
  val_size: 0.25
  num_workers: 0
  random_state: 42
  grad_clip_norm: 5.0
  early_stopping_patience: 5
  use_amp: false
image:
  image_size:
  - 224
  - 224
  image_mean:
  - 0.485
  - 0.456
  - 0.406
  image_std:
  - 0.229
  - 0.224
  - 0.225
preprocessing:
  processing_type: detect_adjust_image
  num_workers: 4
  rotate_angle: 45
  num_rotations: 8
  max_faces_per_image: 1
data:
  dataset_file: data/raw/fairface/fairface_labels.csv
  dataset_image_input_path: data/raw/bucket/fairface-img-margin025
  dataset_image_output_path: data/raw/bucket/fairface-img-margin025
  balance: none
  split_protocol: official
bucket:
  function: download
  bucket_client: s3
  bucket_path_file: data/raw/bucket/
  object_file_name: fairface_original_images.zip
  bucket_name: dataset-fairface
logging:
  log_dir: outputs/logs
  log_level: INFO
  format: '%(asctime)s [%(run_id)s] %(name)s %(levelname)s: %(message)s'
  log_bucket_file: bucket.log
  log_preprocessing_file: preprocessing.log
  log_face_data_file: face_data.log
  log_version_file: version.log
  log_training_file: training.log
  log_evaluation_file: evaluation.log
