# Dataset-factor decomposition — arm=r2base recipe=exp05_ce seed=42
# dataset=data/raw/fairface/fairface_labels_clean.csv
# 25 epochs, fp32 (use_amp=false), torch 2.12 + PIL (current env). 3-seed matched comparison rule.
# Generated by scripts/generate_dataset_factor_configs.py — do not edit by hand.

model:
  name: LResNet50E_IR
  pretrained: true
  num_classes: 7
  dropout: 0.2
  head: linear
  arcface_s: 30.0
  arcface_m: 0.5
  arcface_easy_margin: false
training:
  batch_size: 128
  learning_rate: 0.001
  num_epochs: 25
  optimizer: adamw
  scheduler: cosineannealingwarmrestarts
  loss_function: cross_entropy
  test_size: 0.1
  val_size: 0.1
  num_workers: 4
  random_state: 42
  grad_clip_norm: 5.0
  early_stopping_patience: 5
  use_amp: false
image:
  image_size:
  - 224
  - 224
  image_mean:
  - 0.485
  - 0.456
  - 0.406
  image_std:
  - 0.229
  - 0.224
  - 0.225
preprocessing:
  processing_type: detect_adjust_image
  num_workers: 4
  rotate_angle: 45
  num_rotations: 8
  max_faces_per_image: 1
data:
  dataset_file: data/raw/fairface/fairface_labels_clean.csv
  dataset_image_input_path: data/processed/fairface_aligned
  dataset_image_output_path: data/processed/fairface_aligned
  balance: undersample
bucket:
  function: download
  bucket_client: s3
  bucket_path_file: data/raw/bucket/
  object_file_name: fairface_original_images.zip
  bucket_name: dataset-fairface
logging:
  log_dir: outputs/logs
  log_level: INFO
  format: '%(asctime)s [%(run_id)s] %(name)s %(levelname)s: %(message)s'
  log_bucket_file: bucket.log
  log_preprocessing_file: preprocessing.log
  log_face_data_file: face_data.log
  log_version_file: version.log
  log_training_file: training.log
  log_evaluation_file: evaluation.log
