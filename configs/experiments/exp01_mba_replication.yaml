# Experiment 01 — Replicate MBA Cap. 4 § Resultado Experimento 1.
#
# Spec from the MBA dissertation (Cap. 4):
#   "Utilização da função de perda CrossEntropyLoss combinada com o
#    otimizador SGD, utilizando o conjunto de dados balanceado e o
#    scheduler OneCycleLR."
# MBA reported: accuracy=0.68, F1=0.68, with the original (buggy) pipeline.
#
# This run uses the corrected pipeline (Sprints A/B/C):
#   - image_std bug §2.3 fixed
#   - alignment landmarks bug §2.14 fixed
#   - random_state pinned + cuDNN deterministic
# Expectation: equal-or-better accuracy than the MBA's 0.68 baseline.

model:
  name: "LResNet50E_IR"
  pretrained: true
  num_classes: 7
  dropout: 0.5
  head: "linear"
  arcface_s: 30.0
  arcface_m: 0.5
  arcface_easy_margin: false

training:
  batch_size: 128
  learning_rate: 0.001
  num_epochs: 25
  optimizer: "sgd"
  scheduler: "onecyclelr"
  loss_function: "cross_entropy"
  test_size: 0.2
  num_workers: 4
  random_state: 42

image:
  image_size: [224, 224]
  image_mean: [0.485, 0.456, 0.406]
  image_std:  [0.229, 0.224, 0.225]

preprocessing:
  processing_type: "detect_adjust_image"
  num_workers: 4
  rotate_angle: 45
  num_rotations: 8
  max_faces_per_image: 1

data:
  dataset_file: "data/raw/fairface/fairface_labels.csv"
  dataset_image_input_path:  "data/processed/fairface_aligned"
  dataset_image_output_path: "data/processed/fairface_aligned"
  balance: "undersample"

bucket:
  function: "download"
  bucket_client: "s3"
  bucket_path_file: "data/raw/bucket/"
  object_file_name: "fairface_original_images.zip"
  bucket_name: "dataset-fairface"

logging:
  log_dir: "outputs/logs"
  log_level: "INFO"
  format: "%(asctime)s [%(run_id)s] %(name)s %(levelname)s: %(message)s"
  log_bucket_file: "bucket.log"
  log_preprocessing_file: "preprocessing.log"
  log_face_data_file: "face_data.log"
  log_version_file: "version.log"
  log_training_file: "training.log"
  log_evaluation_file: "evaluation.log"
