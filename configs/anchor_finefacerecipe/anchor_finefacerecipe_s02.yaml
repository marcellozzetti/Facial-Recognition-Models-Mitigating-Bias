# FineFACE-recipe ANCHOR (NO multi-expert) — seed=2
# ResNet-50 + Linear + SGD diff-LR (bb=2e-4, head=2e-3) + 448px
# RandomCrop pad=8 + Normalize(0.5,0.5,0.5). Isolates 'how much
# of the FineFACE gap is recipe vs multi-expert head'.
# Generated by scripts/generate_anchor_finefacerecipe_configs.py.

model:
  name: LResNet50E_IR
  backbone_arch: resnet50
  pretrained: true
  num_classes: 7
  dropout: 0.2
  head: linear
  arcface_s: 30.0
  arcface_m: 0.5
  arcface_easy_margin: false
training:
  batch_size: 16
  learning_rate: 0.002
  lr_backbone: 0.0002
  weight_decay: 0.0005
  num_epochs: 25
  optimizer: sgd
  scheduler: cosineannealingwarmrestarts
  loss_function: cross_entropy
  test_size: 0.1
  val_size: 0.1
  num_workers: 0
  random_state: 2
  grad_clip_norm: 5.0
  early_stopping_patience: 5
  use_amp: false
  train_random_crop_padding: 8
image:
  image_size:
  - 448
  - 448
  image_mean:
  - 0.5
  - 0.5
  - 0.5
  image_std:
  - 0.5
  - 0.5
  - 0.5
preprocessing:
  processing_type: detect_adjust_image
  num_workers: 4
  rotate_angle: 45
  num_rotations: 8
  max_faces_per_image: 1
data:
  dataset_file: data/raw/fairface/fairface_labels_clean.csv
  dataset_image_input_path: data/processed/fairface_aligned
  dataset_image_output_path: data/processed/fairface_aligned
  balance: undersample
bucket:
  function: download
  bucket_client: s3
  bucket_path_file: data/raw/bucket/
  object_file_name: fairface_original_images.zip
  bucket_name: dataset-fairface
logging:
  log_dir: outputs/logs
  log_level: INFO
  format: '%(asctime)s [%(run_id)s] %(name)s %(levelname)s: %(message)s'
  log_bucket_file: bucket.log
  log_preprocessing_file: preprocessing.log
  log_face_data_file: face_data.log
  log_version_file: version.log
  log_training_file: training.log
  log_evaluation_file: evaluation.log
